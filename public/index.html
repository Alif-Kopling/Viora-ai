<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>VIORA</title>
  <link rel="stylesheet" href="css/terminal.css">
</head>
<body>
  <canvas id="visualizer"></canvas>

  <div class="mood-overlay" id="moodOverlay">
    <div class="mood-emoji" id="moodEmoji"></div>
    <div class="mood-label" id="moodLabel"></div>
  </div>

  <div class="overlay">
    <div class="top-bar">
        <div class="viora-info">
        <span class="viora-name" id="vioraName">Viora</span>
        <span class="viora-tag" id="vioraTag">nemenin kamu</span>
      </div>
      <div class="top-right">
        <span class="sc sc-speaker" id="scSpeaker" title="Suara">
          <svg viewBox="0 0 24 24" width="16" height="16">
            <path fill="currentColor" d="M3 9v6h4l5 5V4L7 9H3zm13.5 3c0-1.77-1.02-3.29-2.5-4.03v8.05c1.48-.73 2.5-2.25 2.5-4.02zM14 3.23v2.06c2.89.86 5 3.54 5 6.71s-2.11 5.85-5 6.71v2.06c4.01-.91 7-4.49 7-8.77s-2.99-7.86-7-8.77z"/>
          </svg>
        </span>
      </div>
    </div>

    <div class="viz-text" id="vizText">Ketik pesan atau tekan mic...</div>

    <div class="input-area">
      <button class="mic-btn" id="micBtn" title="Voice input">
        <svg viewBox="0 0 24 24" width="18" height="18">
          <path fill="currentColor" d="M12 14c1.66 0 3-1.34 3-3V5c0-1.66-1.34-3-3-3S9 3.34 9 5v6c0 1.66 1.34 3 3 3z"/>
          <path fill="currentColor" d="M17 11c0 2.76-2.24 5-5 5s-5-2.24-5-5H5c0 3.53 2.61 6.43 6 6.92V21h2v-3.08c3.39-.49 6-3.39 6-6.92h-2z"/>
        </svg>
      </button>
      <input type="text" class="chat-input" id="messageInput" placeholder="Ketik pesan..." autofocus>
      <button class="send-btn" id="sendBtn">
        <svg viewBox="0 0 24 24" width="18" height="18">
          <path fill="currentColor" d="M2.01 21L23 12 2.01 3 2 10l15 2-15 2z"/>
        </svg>
      </button>
    </div>
  </div>

  <div class="chat-drawer" id="chatDrawer">
    <div class="chat-drawer-toggle" id="chatToggle">
      <span class="chat-toggle-icon">&#x25b2;</span>
      <span>Chat Log</span>
      <span class="chat-toggle-count" id="chatToggleCount">0</span>
    </div>
    <div class="chat-area" id="chatArea">
      <div class="message system">
        <div class="bubble system-bubble">VIORA siap nemenin kamu!</div>
      </div>
    </div>
  </div>

  <script src="js/terminal.js"></script>
  <script src="js/visualizer.js"></script>
  <script src="js/voice.js"></script>
  <script src="js/app.js"></script>
</body>
</html>
